name: encuestas_yeti
description: "Encuestas Casa del Yeti - activación Free Fire"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.1.4
  excel: ^4.0.6
  http: ^1.2.2
  share_plus: ^10.1.2
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/android-icon-192x192.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/icon/android-icon-192x192.png"

flutter:
  uses-material-design: true
  assets:
    - assets/background/fondo_tablet.png
    - assets/icon/android-icon-192x192.png
